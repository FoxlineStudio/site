<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #2a002a, #1a001a);
            border-radius: 20px;
            border: 1px solid #3a0035;
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #d000ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .profile-avatar-large:hover {
            transform: scale(1.05);
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 28px;
            color: #d000ff;
            margin: 0;
        }
        .profile-email {
            color: #aaa;
            font-size: 14px;
        }
        .profile-role {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
        }
        .role-admin { background: #d000ff; color: #fff; }
        .role-dubber { background: #6d076d; color: #fff; }
        .role-user { background: #3a0035; color: #aaa; }

        .profile-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }
        .stat-item {
            text-align: center;
            padding: 10px 20px;
            background: rgba(58, 0, 53, 0.3);
            border-radius: 12px;
            min-width: 80px;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #d000ff;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .stat-clickable {
            cursor: pointer;
            transition: all 0.3s;
        }
        .stat-clickable:hover {
            background: rgba(58, 0, 53, 0.5);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .action-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: #fff;
        }
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }
        .action-btn.danger {
            background: #6d0000;
            color: #fff;
        }
        .action-btn.danger:hover {
            background: #8a0000;
        }
        .action-btn.outline {
            background: transparent;
            border: 2px solid #6d076d;
            color: #aaa;
        }
        .action-btn.outline:hover {
            border-color: #d000ff;
            color: #fff;
        }
        .action-btn.subscribed {
            background: #1a3a1a;
            color: #4CAF50;
            border: 2px solid #4CAF50;
        }
        .action-btn.subscribed:hover {
            background: #2a4a2a;
        }

        .achievements-section {
            margin-top: 30px;
        }
        .achievements-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .achievement-card {
            padding: 10px 16px;
            background: rgba(208, 0, 255, 0.1);
            border: 1px solid #6d076d;
            border-radius: 12px;
            text-align: center;
            min-width: 100px;
        }
        .achievement-icon {
            font-size: 28px;
        }
        .achievement-name {
            font-size: 12px;
            color: #d000ff;
            margin-top: 4px;
        }
        .achievement-desc {
            font-size: 10px;
            color: #666;
        }

        .admin-panel {
            margin-top: 30px;
            padding: 20px;
            background: rgba(208, 0, 255, 0.05);
            border: 1px solid #6d076d;
            border-radius: 15px;
        }
        .admin-panel h3 {
            color: #d000ff;
            margin-bottom: 15px;
        }
        .admin-panel .form-group {
            margin-bottom: 12px;
        }
        .admin-panel .form-group label {
            color: #aaa;
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
        }
        .admin-panel .form-group input,
        .admin-panel .form-group select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #3a0035;
            background: rgba(58, 0, 53, 0.2);
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .admin-panel .form-group input:focus {
            border-color: #d000ff;
            outline: none;
        }

        .user-search-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(58, 0, 53, 0.2);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .user-search-result .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-search-result .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-search-result .user-name {
            color: #d000ff;
        }
        .user-search-result .user-role {
            font-size: 12px;
            color: #666;
        }
        .user-search-result .role-select {
            padding: 4px 12px;
            border-radius: 15px;
            border: 1px solid #3a0035;
            background: #1a001a;
            color: #fff;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #1a001a;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 95%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #6d076d;
            position: relative;
        }
        .modal-content h2 {
            color: #d000ff;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #fff;
        }
        .modal-content .form-group {
            margin-bottom: 12px;
        }
        .modal-content .form-group label {
            color: #aaa;
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
        }
        .modal-content .form-group input,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #3a0035;
            background: rgba(58, 0, 53, 0.2);
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .modal-content .form-group textarea {
            min-height: 60px;
            resize: vertical;
        }
        .modal-content .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .modal-content .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }

        .auth-message {
            text-align: center;
            padding: 40px 20px;
        }
        .auth-message h2 {
            color: #d000ff;
        }
        .auth-message p {
            color: #aaa;
        }
        .auth-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="dub-in.html" class="nav-icon-btn" id="dubInLink" style="display:none;">🎙️DUB-in</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <hr>
    </div>
    
    <div class="content-box">
        <div id="profileContent">
            <div class="loading" style="text-align:center; padding:40px; color:#aaa;">⏳ Загрузка...</div>
        </div>
    </div>
</div>

<!-- Модальное окно для списка подписчиков/подписок -->
<div class="modal-overlay" id="usersModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeUsersModal()">✕</button>
        <h2 id="usersModalTitle">Пользователи</h2>
        <div id="usersModalBody"></div>
    </div>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        getUserData,
        getUserByEmail,
        updateUserProfile,
        updateUserRole,
        getAllUsers,
        isAdmin,
        toggleSubscribe,
        isSubscribed,
        getSubscribersCount,
        ACHIEVEMENTS,
        addCustomAchievement,
        logoutUser
    } from './firebase-config.js';

    let currentUser = null;
    let currentUserData = null;
    let viewedUserData = null;
    let viewedUserId = null;
    let isAdminUser = false;
    let isSubscribedToView = false;

    const urlParams = new URLSearchParams(window.location.search);
    const viewedId = urlParams.get('uid');

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    async function updateDubInLink(user) {
        const link = document.getElementById('dubInLink');
        if (!link) return;
        if (user) {
            const role = await getUserData(user.uid);
            const isDubber = role.success && (role.data.role === 'dubber' || role.data.role === 'admin');
            link.style.display = isDubber ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    // ===== МОДАЛЬНОЕ ОКНО ДЛЯ ПОДПИСЧИКОВ =====

    window.openUsersModal = function(title, users) {
        document.getElementById('usersModalTitle').textContent = title;
        const body = document.getElementById('usersModalBody');
        
        if (!users || users.length === 0) {
            body.innerHTML = '<p style="color:#666; text-align:center;">Нет пользователей</p>';
        } else {
            body.innerHTML = users.map(uid => `
                <a href="profile.html?uid=${uid}" class="user-search-result" style="text-decoration:none;">
                    <div class="user-info">
                        <img src="${currentUserData?.photoURL || 'https://via.placeholder.com/32/3a0035/fff?text=?'}" class="user-avatar-small" onerror="this.src='https://via.placeholder.com/32/3a0035/fff?text=?'">
                        <span class="user-name">${uid}</span>
                    </div>
                    <span style="color:#666;">→</span>
                </a>
            `).join('');
        }
        
        document.getElementById('usersModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closeUsersModal = function() {
        document.getElementById('usersModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    document.getElementById('usersModal').addEventListener('click', function(e) {
        if (e.target === this) closeUsersModal();
    });

    // ===== ФУНКЦИИ ПРОФИЛЯ =====

    async function renderProfile(user, userData, isOwnProfile) {
        const container = document.getElementById('profileContent');
        
        const avatarUrl = userData.photoURL || '';
        const displayName = userData.displayName || 'Пользователь';
        const email = userData.email || 'Не указан';
        const role = userData.role || 'user';
        const viewsCount = userData.viewsCount || 0;
        const commentsCount = userData.commentsCount || 0;
        const subscribers = userData.subscribers || [];
        const subscriptions = userData.subscriptions || [];
        const achievements = userData.achievements || [];

        const roleNames = {
            'admin': '👑 Администратор',
            'dubber': '🎙️ Даббер',
            'user': '👤 Пользователь'
        };
        const roleClass = {
            'admin': 'role-admin',
            'dubber': 'role-dubber',
            'user': 'role-user'
        };

        const isAdminViewer = isAdminUser;

        // Кнопка подписки (только если не свой профиль)
        let subscribeButton = '';
        if (!isOwnProfile) {
            const isSub = await isSubscribed(currentUser?.uid, viewedUserId);
            subscribeButton = `
                <button class="action-btn ${isSub ? 'subscribed' : 'outline'}" onclick="handleSubscribe()">
                    ${isSub ? '✅ Подписан' : '➕ Подписаться'}
                </button>
            `;
        }

        // Админ-панель (только для админов)
        let adminPanel = '';
        if (isAdminViewer && !isOwnProfile) {
            adminPanel = `
                <div class="admin-panel">
                    <h3>👑 Управление пользователем</h3>
                    <div class="form-group">
                        <label>Роль</label>
                        <select id="adminRoleSelect" onchange="handleRoleChange()">
                            <option value="user" ${role === 'user' ? 'selected' : ''}>Пользователь</option>
                            <option value="dubber" ${role === 'dubber' ? 'selected' : ''}>Даббер</option>
                            <option value="admin" ${role === 'admin' ? 'selected' : ''}>Администратор</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Выдать кастомное достижение</label>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <input type="text" id="customAchievementName" placeholder="Название" style="flex:1;">
                            <input type="text" id="customAchievementIcon" placeholder="Иконка" style="width:60px;">
                            <button class="action-btn primary" onclick="handleCustomAchievement()">➕ Выдать</button>
                        </div>
                    </div>
                    <button class="action-btn danger" onclick="handleDeleteUser()">🗑️ Удалить пользователя</button>
                </div>
            `;
        }

        // Достижения
        let achievementsHtml = '';
        if (achievements.length > 0) {
            achievementsHtml = `
                <div class="achievements-section">
                    <h3 style="color:#d000ff;">🏆 Достижения</h3>
                    <div class="achievements-grid">
                        ${achievements.map(a => `
                            <div class="achievement-card">
                                <div class="achievement-icon">${a.icon || '🏅'}</div>
                                <div class="achievement-name">${a.name}</div>
                                <div class="achievement-desc">${a.description || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Статистика (кликабельная для подписчиков/подписок)
        const subscribersCount = subscribers.length;
        const subscriptionsCount = subscriptions.length;

        container.innerHTML = `
            <div class="profile-container">
                <div class="profile-header">
                    <img src="${avatarUrl || 'https://via.placeholder.com/120/3a0035/d000ff?text=?'}" 
                         class="profile-avatar-large" 
                         onerror="this.src='https://via.placeholder.com/120/3a0035/d000ff?text=?'">
                    <div class="profile-info">
                        <h1 class="profile-name">${displayName}</h1>
                        <div class="profile-email">${isOwnProfile ? email : ''}</div>
                        <span class="profile-role ${roleClass[role] || 'role-user'}">${roleNames[role] || 'Пользователь'}</span>
                        
                        <div class="profile-actions">
                            ${isOwnProfile ? `
                                <button class="action-btn primary" onclick="handleEditProfile()">✏️ Редактировать профиль</button>
                                <button class="action-btn danger" onclick="handleLogout()">🚪 Выйти</button>
                            ` : subscribeButton}
                        </div>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-number">${viewsCount}</div>
                        <div class="stat-label">Просмотров</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${commentsCount}</div>
                        <div class="stat-label">Комментариев</div>
                    </div>
                    <div class="stat-item stat-clickable" onclick="openUsersModal('Подписчики', ${JSON.stringify(subscribers)})">
                        <div class="stat-number">${subscribersCount}</div>
                        <div class="stat-label">Подписчиков</div>
                    </div>
                    <div class="stat-item stat-clickable" onclick="openUsersModal('Подписки', ${JSON.stringify(subscriptions)})">
                        <div class="stat-number">${subscriptionsCount}</div>
                        <div class="stat-label">Подписок</div>
                    </div>
                </div>

                ${achievementsHtml}
                ${adminPanel}
            </div>
        `;
    }

    // ===== ОБРАБОТЧИКИ =====

    window.handleSubscribe = async function() {
        if (!currentUser) {
            alert('Войдите, чтобы подписаться');
            return;
        }
        const result = await toggleSubscribe(currentUser.uid, viewedUserId);
        if (result.success) {
            await loadProfile();
        } else {
            alert('Ошибка: ' + result.error);
        }
    };

    window.handleEditProfile = function() {
        const name = prompt('Новое имя:', currentUserData?.displayName || '');
        if (name && name.trim()) {
            updateUserProfile(currentUser.uid, { displayName: name.trim() });
            loadProfile();
        }
        const avatar = prompt('Ссылка на аватарку:', currentUserData?.photoURL || '');
        if (avatar !== null) {
            updateUserProfile(currentUser.uid, { photoURL: avatar.trim() });
            loadProfile();
        }
    };

    window.handleRoleChange = function() {
        const select = document.getElementById('adminRoleSelect');
        const newRole = select.value;
        if (confirm(`Изменить роль пользователя на "${newRole}"?`)) {
            updateUserRole(viewedUserId, newRole);
            loadProfile();
        }
    };

    window.handleCustomAchievement = function() {
        const name = document.getElementById('customAchievementName').value.trim();
        const icon = document.getElementById('customAchievementIcon').value.trim() || '🏅';
        if (!name) {
            alert('Введите название достижения');
            return;
        }
        if (confirm(`Выдать достижение "${name}" пользователю?`)) {
            addCustomAchievement(viewedUserId, { id: 'custom_' + Date.now(), name, icon, description: 'Кастомное достижение' });
            loadProfile();
            document.getElementById('customAchievementName').value = '';
            document.getElementById('customAchievementIcon').value = '';
        }
    };

    window.handleDeleteUser = function() {
        if (confirm('Удалить пользователя? Это действие необратимо!')) {
            alert('Функция удаления пользователя пока не реализована');
        }
    };

    window.handleLogout = async function() {
        if (!confirm('Вы уверены, что хотите выйти?')) return;
        const result = await logoutUser();
        if (result.success) {
            window.location.href = 'index.html';
        }
    };

    // ===== ОСНОВНАЯ ЗАГРУЗКА =====

    async function loadProfile() {
        const container = document.getElementById('profileContent');
        container.innerHTML = '<div class="loading" style="text-align:center; padding:40px; color:#aaa;">⏳ Загрузка...</div>';
        
        const user = getCurrentUser();
        currentUser = user;
        
        if (!user && !viewedId) {
            container.innerHTML = `
                <div class="auth-message">
                    <h2>🔒 Вы не авторизованы</h2>
                    <p>Войдите или зарегистрируйтесь, чтобы увидеть профиль</p>
                    <br>
                    <a href="login.html" class="auth-btn">🔑 Войти</a>
                </div>
            `;
            return;
        }

        // Определяем, чей профиль смотрим
        const targetUid = viewedId || user?.uid;
        if (!targetUid) {
            container.innerHTML = '<p style="color:#ff6b6b; text-align:center;">Пользователь не найден</p>';
            return;
        }

        viewedUserId = targetUid;
        const isOwnProfile = user && user.uid === targetUid;

        // Загружаем данные
        const result = await getUserData(targetUid);
        if (!result.success) {
            container.innerHTML = `<p style="color:#ff6b6b; text-align:center;">❌ ${result.error}</p>`;
            return;
        }

        viewedUserData = result.data;
        if (isOwnProfile) {
            currentUserData = result.data;
        }

        // Проверяем, админ ли текущий пользователь
        if (user) {
            const roleResult = await getUserData(user.uid);
            isAdminUser = roleResult.success && roleResult.data.role === 'admin';
        }

        await renderProfile(user, viewedUserData, isOwnProfile);
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====

    onAuthStateChangedListener(async (user) => {
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        if (!user && !viewedId) {
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <div class="auth-message">
                    <h2>🔒 Вы не авторизованы</h2>
                    <p>Войдите или зарегистрируйтесь, чтобы увидеть профиль</p>
                    <br>
                    <a href="login.html" class="auth-btn">🔑 Войти</a>
                </div>
            `;
        } else {
            await loadProfile();
        }
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const user = getCurrentUser();
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await loadProfile();
    });
</script>
