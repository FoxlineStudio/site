<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #d000ff;
            margin: 0 auto 20px;
            display: block;
        }
        .profile-field {
            max-width: 400px;
            margin: 15px auto;
            text-align: left;
        }
        .profile-field label {
            color: #aaa;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }
        .profile-field input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #6d076d;
            background: rgba(58, 0, 53, 0.2);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .profile-field input:focus {
            border-color: #d000ff;
            outline: none;
            box-shadow: 0 0 20px rgba(208, 0, 255, 0.2);
        }
        .save-btn {
            padding: 14px 40px;
            font-size: 18px;
            margin-top: 10px;
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }
        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            padding: 10px 20px;
            border-radius: 10px;
            margin: 10px auto;
            max-width: 400px;
            display: none;
        }
        .message-success {
            background: #1a3a1a;
            color: #4CAF50;
        }
        .message-error {
            background: #3a0035;
            color: #ff6b6b;
        }
        .message-info {
            background: #1a1a3a;
            color: #88ccff;
        }
        .profile-info {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
        }
        .logout-btn {
            padding: 14px 40px;
            font-size: 18px;
            margin-top: 20px;
            background: #3a0035;
            color: #ff6b6b;
            border: 2px solid #6d076d;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: #4a0045;
            border-color: #ff6b6b;
            transform: translateY(-2px);
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6d076d;
            margin: 10px auto;
            display: block;
        }
        .default-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a0035, #1a001a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: #d000ff;
            margin: 0 auto 20px;
            border: 4px solid #d000ff;
        }
        .auth-message {
            padding: 40px 20px;
            text-align: center;
        }
        .auth-message h2 {
            color: #d000ff;
        }
        .auth-message p {
            color: #aaa;
        }
        .auth-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <hr>
    </div>
    
    <div class="content-box">
        <div id="profileContent">
            <div class="loading" style="text-align:center; padding:40px; color:#aaa;">⏳ Загрузка...</div>
        </div>
    </div>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        getUserData,
        updateUserProfile,
        logoutUser
    } from './firebase-config.js';

    let currentUserData = null;
    let currentUid = null;
    let isLoading = false;

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    function showMessage(type, text) {
        const container = document.getElementById('profileContent');
        const existing = container.querySelector('.message');
        if (existing) existing.remove();
        
        const div = document.createElement('div');
        div.className = `message message-${type}`;
        div.textContent = type === 'success' ? '✅ ' + text : 
                         type === 'error' ? '❌ ' + text : 
                         'ℹ️ ' + text;
        div.style.display = 'block';
        
        // Вставляем после заголовка
        const title = container.querySelector('h2');
        if (title) {
            title.after(div);
        } else {
            container.prepend(div);
        }
        
        setTimeout(() => {
            div.style.display = 'none';
        }, 5000);
    }

    window.saveProfile = async function() {
        if (isLoading) return;
        
        const nameInput = document.getElementById('profileName');
        const avatarInput = document.getElementById('profileAvatar');
        const saveBtn = document.getElementById('saveBtn');
        
        if (!nameInput || !avatarInput) return;
        
        const newName = nameInput.value.trim();
        const newAvatar = avatarInput.value.trim();
        
        if (!newName) {
            showMessage('error', 'Имя не может быть пустым');
            return;
        }
        
        isLoading = true;
        saveBtn.disabled = true;
        saveBtn.textContent = '⏳ Сохранение...';
        
        const updateData = {};
        if (newName !== currentUserData.displayName) {
            updateData.displayName = newName;
        }
        if (newAvatar !== (currentUserData.photoURL || '')) {
            updateData.photoURL = newAvatar;
        }
        
        if (Object.keys(updateData).length === 0) {
            showMessage('info', 'Изменений не было');
            isLoading = false;
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 Сохранить';
            return;
        }
        
        const result = await updateUserProfile(currentUid, updateData);
        if (result.success) {
            showMessage('success', 'Профиль обновлён!');
            await loadProfile();
        } else {
            showMessage('error', result.error);
        }
        
        isLoading = false;
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Сохранить';
    };

    window.handleLogout = async function() {
        if (!confirm('Вы уверены, что хотите выйти?')) return;
        const result = await logoutUser();
        if (result.success) {
            window.location.href = 'index.html';
        } else {
            showMessage('error', result.error);
        }
    };

    function renderProfile(data, user) {
        const container = document.getElementById('profileContent');
        const avatarUrl = data.photoURL || '';
        const displayName = data.displayName || 'Пользователь';
        const email = user?.email || data.email || 'Не указан';
        
        const avatarHtml = avatarUrl ? 
            `<img src="${avatarUrl}" class="profile-avatar" onerror="this.src='https://via.placeholder.com/150/3a0035/d000ff?text=?'">` :
            `<div class="default-avatar">👤</div>`;
        
        const previewHtml = avatarUrl ? 
            `<img src="${avatarUrl}" class="avatar-preview" onerror="this.style.display='none'">` : '';
        
        const createdAt = data.createdAt ? 
            new Date(data.createdAt.seconds * 1000).toLocaleDateString() : 
            'Неизвестно';
        
        container.innerHTML = `
            <h2 class="title" style="text-align:center;">👤 Профиль</h2>
            
            ${avatarHtml}
            
            <div class="profile-field">
                <label>👤 Имя</label>
                <input type="text" id="profileName" value="${displayName}" placeholder="Ваше имя">
            </div>
            
            <div class="profile-field">
                <label>🖼️ Ссылка на аватарку</label>
                <input type="text" id="profileAvatar" value="${avatarUrl}" placeholder="https://example.com/avatar.jpg">
                ${previewHtml}
                <small style="color:#666;display:block;margin-top:5px;">Вставьте прямую ссылку на изображение</small>
            </div>
            
            <button class="save-btn" id="saveBtn" onclick="saveProfile()">💾 Сохранить</button>
            
            <div class="profile-info">
                <p>📧 Email: ${email}</p>
                <p>📅 В команде с: ${createdAt}</p>
            </div>
            
            <br>
            <button class="logout-btn" onclick="handleLogout()">🚪 Выйти</button>
            <br><br>
        `;
        
        // Превью аватарки при вводе
        const avatarInput = document.getElementById('profileAvatar');
        if (avatarInput) {
            avatarInput.addEventListener('input', function() {
                let preview = document.querySelector('.avatar-preview');
                if (this.value) {
                    if (!preview) {
                        const newPreview = document.createElement('img');
                        newPreview.className = 'avatar-preview';
                        this.parentNode.appendChild(newPreview);
                        preview = newPreview;
                    }
                    preview.src = this.value;
                    preview.onerror = function() { this.style.display = 'none'; };
                    preview.style.display = 'block';
                } else if (preview) {
                    preview.style.display = 'none';
                }
            });
        }
    }

    function renderNotAuthorized() {
        const container = document.getElementById('profileContent');
        container.innerHTML = `
            <div class="auth-message">
                <h2>🔒 Вы не авторизованы</h2>
                <p>Войдите или зарегистрируйтесь, чтобы увидеть профиль</p>
                <br>
                <a href="login.html" class="auth-btn">🔑 Войти</a>
            </div>
        `;
    }

    async function loadProfile() {
        const container = document.getElementById('profileContent');
        const user = getCurrentUser();
        
        if (!user) {
            updateAuthButton(null);
            renderNotAuthorized();
            return;
        }
        
        updateAuthButton(user);
        currentUid = user.uid;
        
        container.innerHTML = '<div class="loading" style="text-align:center; padding:40px; color:#aaa;">⏳ Загрузка профиля...</div>';
        
        const result = await getUserData(user.uid);
        if (result.success) {
            currentUserData = result.data;
            renderProfile(currentUserData, user);
        } else {
            // Если данные не найдены — создаём их
            try {
                const { db } = await import('./firebase-config.js');
                const { doc, setDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
                
                const newData = {
                    displayName: user.displayName || user.email || 'Пользователь',
                    email: user.email,
                    photoURL: user.photoURL || '',
                    createdAt: serverTimestamp()
                };
                await setDoc(doc(db, "users", user.uid), newData);
                currentUserData = newData;
                renderProfile(currentUserData, user);
            } catch (error) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <h2 style="color:#d000ff;">❌ Ошибка загрузки</h2>
                        <p style="color:#ff6b6b;">${result.error || error.message}</p>
                        <br>
                        <button onclick="location.reload()" class="save-btn" style="display:inline-block;">🔄 Обновить</button>
                        <br><br>
                        <a href="index.html" style="color:#6d076d; text-decoration:none;">🏠 На главную</a>
                    </div>
                `;
            }
        }
    }

    // Следим за состоянием авторизации
    onAuthStateChangedListener((user) => {
        updateAuthButton(user);
        if (user) {
            loadProfile();
        } else {
            renderNotAuthorized();
        }
    });

    // Первичная загрузка
    loadProfile();
</script>

</body>
</html>
