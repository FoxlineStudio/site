<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <hr>
    </div>
    
    <div class="content-box" id="title-content">
        <div class="loading">Загрузка...</div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p>© 2026 foxline Studio</p>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        addComment,
        getComments,
        deleteComment
    } from './firebase-config.js';

    const titleId = new URLSearchParams(window.location.search).get('id');

    // Обновляем кнопку авторизации
    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    // Загрузка комментариев
    async function loadComments() {
        const comments = await getComments(titleId);
        const container = document.getElementById('comments-list');
        if (comments.length === 0) {
            container.innerHTML = '<p style="color:#aaa;">Пока нет комментариев. Будьте первым!</p>';
            return;
        }
        const user = getCurrentUser();
        container.innerHTML = comments.map(c => {
            const isOwner = user && c.uid === user.uid;
            return `
                <div class="comment-card" style="background:#2a002a; border-left-color:#d000ff; position:relative;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="color:#d000ff;">${c.name || 'Аноним'}</b>
                            <span style="color:#ffaa00;">${'⭐'.repeat(c.rating || 5)}</span>
                        </div>
                        ${isOwner ? `<button onclick="handleDeleteComment('${c.id}')" style="background:#6d076d; color:#fff; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑️</button>` : ''}
                    </div>
                    <p style="color:#fff; margin-top:8px;">${c.text}</p>
                    <small style="color:#666;">${c.time ? new Date(c.time.seconds * 1000).toLocaleDateString() : 'Только что'}</small>
                </div>
            `;
        }).join('');
    }

    // Отправка комментария
    window.handleAddComment = async function() {
        const text = document.getElementById('commentText').value;
        const rating = document.getElementById('commentRating').value;
        if (!text) {
            alert('Введите текст комментария');
            return;
        }
        const result = await addComment(titleId, text, parseInt(rating));
        if (result.success) {
            document.getElementById('commentText').value = '';
            await loadComments();
        } else {
            alert('Ошибка: ' + result.error);
        }
    };

    // Удаление комментария
    window.handleDeleteComment = async function(commentId) {
        if (!confirm('Удалить комментарий?')) return;
        const result = await deleteComment(commentId);
        if (result.success) {
            await loadComments();
        } else {
            alert('Ошибка: ' + result.error);
        }
    };

    // Основная загрузка тайтла
    function loadTitle() {
        const content = document.getElementById('title-content');
        
        setTimeout(async () => {
            const title = window.getTitleById?.(titleId) || window.titlesDatabase?.find(t => t.id === titleId);
            
            if (!title) {
                content.innerHTML = '<div style="text-align:center; padding:50px; color:#fff;">❌ Тайтл не найден</div>';
                return;
            }

            const roles = window.rolesDatabase?.filter(r => r.titleId === titleId) || [];
            
            let charactersHtml = '';
            if (roles.length > 0) {
                charactersHtml = '<h2 style="color:#d000ff;">🎭 Персонажи и озвучка</h2><div class="characters-grid">';
                roles.forEach(role => {
                    const voice = window.voicesDatabase?.find(v => v.id === role.voiceId);
                    charactersHtml += `
                        <div class="character-card">
                            <img src="${role.characterImage || 'https://via.placeholder.com/180x150/3a0035/fff?text=Персонаж'}" class="character-image" onerror="this.src='https://via.placeholder.com/180x150/3a0035/fff?text=?'">
                            <div class="character-name">${role.character}</div>
                            <p style="color:#aaa;">Озвучивает: <a href="voice.html?id=${role.voiceId}" style="color:#d000ff;">${voice?.name || role.voiceId}</a></p>
                        </div>
                    `;
                });
                charactersHtml += '</div>';
            }

            const episodes = title.episodesList || [];
            
            let episodesHtml = '';
            if (episodes.length > 0) {
                episodesHtml = `
                    <h2 style="color:#d000ff; margin-top:30px;">📺 Список серий</h2>
                    <div class="episodes-list">
                        ${episodes.map(ep => `
                            <div class="episode-item" onclick="playEpisode('${ep.url}')" style="cursor:pointer;">
                                <span class="episode-number">Серия ${ep.number}</span>
                                <span class="episode-title" style="color:#fff;">${ep.title}</span>
                                <span class="episode-status ${ep.status === 'Озвучено' ? 'status-ready' : 'status-soon'}">${ep.status}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const firstEpisode = episodes.find(ep => ep.url) || { url: '' };
            
            const user = getCurrentUser();
            let commentForm = '';
            if (user) {
                commentForm = `
                    <div style="margin:20px 0; display:flex; flex-wrap:wrap; gap:10px;">
                        <textarea id="commentText" placeholder="Ваш комментарий..." style="flex:1; padding:12px; border-radius:10px; border:2px solid #6d076d; background:rgba(58,0,53,0.2); color:#fff; min-height:80px;"></textarea>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <select id="commentRating" style="padding:12px; border-radius:10px; border:2px solid #6d076d; background:#1a001a; color:#fff;">
                                <option value="5">⭐⭐⭐⭐⭐</option>
                                <option value="4">⭐⭐⭐⭐</option>
                                <option value="3">⭐⭐⭐</option>
                                <option value="2">⭐⭐</option>
                                <option value="1">⭐</option>
                            </select>
                            <button onclick="handleAddComment()" class="search-button" style="padding:12px 25px;">Отправить</button>
                        </div>
                    </div>
                `;
            } else {
                commentForm = `<div style="background:#2a002a; padding:20px; border-radius:10px; text-align:center; color:#aaa;">
                    <a href="login.html" style="color:#d000ff;">Войдите</a>, чтобы оставить комментарий
                </div>`;
            }

            content.innerHTML = `
                <div class="anime-header">
                    <img src="${title.imageHorizontal || title.imageVertical}" alt="${title.name}" class="anime-poster" onerror="this.src='https://via.placeholder.com/250/3a0035/fff?text=${title.name}'">
                    <div class="anime-info">
                        <h1 class="anime-title" style="color:#d000ff;">${title.name}</h1>
                        <div class="anime-meta">
                            <span class="anime-tag">${title.type || 'Аниме'}</span>
                            <span class="anime-tag">${title.year || '2025'}</span>
                            <span class="anime-tag">${title.episodes || '?'} серий</span>
                            <span class="anime-tag">⭐ ${title.rating || '4.5'}</span>
                        </div>
                        <p style="color:#fff;"><strong style="color:#d000ff;">Жанры:</strong> ${title.genres?.join(', ') || 'Не указаны'}</p>
                        <div class="anime-description" style="color:#ccc;">${title.description || 'Описание отсутствует'}</div>
                    </div>
                </div>
                
                <h2 style="color:#d000ff;">▶ Смотреть онлайн</h2>
                <div class="player-container" id="playerContainer">
                    ${firstEpisode.url ? `
                        <iframe id="playerFrame" width="100%" height="100%" src="${firstEpisode.url}" frameborder="0" allowfullscreen></iframe>
                    ` : `
                        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#666; background:#1a001a;">
                            <p>Скоро появится</p>
                        </div>
                    `}
                </div>
                
                ${episodesHtml}
                
                ${charactersHtml}
                
                <h2 style="color:#d000ff; margin-top:30px;">💬 Комментарии</h2>
                ${commentForm}
                <div id="comments-list" style="margin-top:15px;">
                    <p style="color:#aaa;">Загрузка комментариев...</p>
                </div>
            `;

            // Загружаем комментарии
            await loadComments();
        }, 100);
    }

    // Смена серии
    window.playEpisode = function(url) {
        const container = document.getElementById('playerContainer');
        if (!url) {
            container.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#666; background:#1a001a;">
                    <p>Серия ещё не доступна</p>
                </div>
            `;
            return;
        }
        container.innerHTML = `
            <iframe id="playerFrame" width="100%" height="100%" src="${url}" frameborder="0" allowfullscreen></iframe>
        `;
    };

    // Подписка на изменения авторизации
    onAuthStateChangedListener((user) => {
        updateAuthButton(user);
        if (user && document.getElementById('comments-list')) {
            loadComments();
        }
    });

    document.addEventListener('DOMContentLoaded', loadTitle);
</script>

</body>
</html>
