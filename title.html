<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .comment-item {
            background: #2a002a;
            border-left: 4px solid #d000ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .comment-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .comment-name {
            color: #d000ff;
            font-weight: bold;
        }
        .comment-rating {
            color: #ffaa00;
        }
        .comment-text {
            color: #fff;
            margin-top: 8px;
        }
        .comment-time {
            color: #666;
            font-size: 12px;
        }
        .comment-delete {
            background: #6d076d;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .comment-delete:hover {
            background: #8a0a8a;
        }
        .comment-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        .comment-form textarea {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #6d076d;
            background: rgba(58, 0, 53, 0.2);
            color: #fff;
            min-height: 80px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        .comment-form textarea:focus {
            border-color: #d000ff;
            outline: none;
            box-shadow: 0 0 20px rgba(208, 0, 255, 0.2);
        }
        .comment-form .form-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .comment-form select {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #6d076d;
            background: #1a001a;
            color: #fff;
            font-size: 16px;
        }
        .comment-form button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #6d076d, #3a0035);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 0, 255, 0.3);
        }
        .comment-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .no-comments {
            color: #aaa;
            text-align: center;
            padding: 20px;
        }
        .auth-prompt {
            background: #2a002a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #aaa;
        }
        .auth-prompt a {
            color: #d000ff;
            text-decoration: none;
            font-weight: bold;
        }
        .auth-prompt a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <hr>
    </div>
    
    <div class="content-box" id="title-content">
        <div class="loading">⏳ Загрузка...</div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p>© 2026 foxline Studio</p>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        addComment,
        getComments,
        deleteComment
    } from './firebase-config.js';

    const titleId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    async function loadComments() {
        const container = document.getElementById('comments-list');
        if (!container) return;
        
        container.innerHTML = '<div style="color:#aaa; text-align:center; padding:10px;">⏳ Загрузка комментариев...</div>';
        
        try {
            const comments = await getComments(titleId);
            
            if (!comments || comments.length === 0) {
                container.innerHTML = '<div class="no-comments">💬 Пока нет комментариев. Будьте первым!</div>';
                return;
            }
            
            const user = getCurrentUser();
            container.innerHTML = comments.map(c => {
                const isOwner = user && c.uid === user.uid;
                const avatarHtml = c.photoURL ? 
                    `<img src="${c.photoURL}" class="comment-avatar" onerror="this.style.display='none'">` : 
                    `<div style="width:32px;height:32px;border-radius:50%;background:#3a0035;display:flex;align-items:center;justify-content:center;color:#d000ff;font-size:16px;">👤</div>`;
                
                return `
                    <div class="comment-item">
                        <div class="comment-header">
                            <div class="comment-user">
                                ${avatarHtml}
                                <span class="comment-name">${c.name || 'Аноним'}</span>
                                <span class="comment-rating">${'⭐'.repeat(c.rating || 5)}</span>
                            </div>
                            ${isOwner ? `<button class="comment-delete" onclick="handleDeleteComment('${c.id}')">🗑️</button>` : ''}
                        </div>
                        <div class="comment-text">${c.text}</div>
                        <div class="comment-time">${c.time ? new Date(c.time.seconds * 1000).toLocaleString() : 'Только что'}</div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error('Ошибка загрузки комментариев:', error);
            container.innerHTML = `<div class="no-comments" style="color:#ff6b6b;">❌ Ошибка загрузки комментариев</div>`;
        }
    }

    window.handleAddComment = async function() {
        const text = document.getElementById('commentText');
        const rating = document.getElementById('commentRating');
        const button = document.querySelector('.comment-form button');
        
        if (!text || !text.value.trim()) {
            alert('Введите текст комментария');
            return;
        }
        
        button.disabled = true;
        button.textContent = '⏳ Отправка...';
        
        const result = await addComment(titleId, text.value.trim(), parseInt(rating.value));
        
        if (result.success) {
            text.value = '';
            await loadComments();
        } else {
            alert('❌ Ошибка: ' + result.error);
        }
        
        button.disabled = false;
        button.textContent = '📤 Отправить';
    };

    window.handleDeleteComment = async function(commentId) {
        if (!confirm('Удалить комментарий?')) return;
        
        const result = await deleteComment(commentId);
        if (result.success) {
            await loadComments();
        } else {
            alert('❌ Ошибка: ' + result.error);
        }
    };

    function renderCommentForm() {
        const container = document.getElementById('comments-container');
        if (!container) return;
        
        const user = getCurrentUser();
        
        if (user) {
            container.innerHTML = `
                <h2 style="color:#d000ff; margin-top:30px;">💬 Комментарии</h2>
                <div class="comment-form">
                    <textarea id="commentText" placeholder="Напишите ваш комментарий..."></textarea>
                    <div class="form-actions">
                        <select id="commentRating">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="1">⭐</option>
                        </select>
                        <button onclick="handleAddComment()">📤 Отправить</button>
                    </div>
                </div>
                <div id="comments-list"></div>
            `;
        } else {
            container.innerHTML = `
                <h2 style="color:#d000ff; margin-top:30px;">💬 Комментарии</h2>
                <div class="auth-prompt">
                    <a href="login.html">Войдите</a>, чтобы оставить комментарий
                </div>
                <div id="comments-list"></div>
            `;
        }
        
        // Загружаем комментарии
        loadComments();
    }

    function loadTitle() {
        const content = document.getElementById('title-content');
        
        setTimeout(async () => {
            const title = window.getTitleById?.(titleId) || window.titlesDatabase?.find(t => t.id === titleId);
            
            if (!title) {
                content.innerHTML = '<div style="text-align:center; padding:50px; color:#fff;">❌ Тайтл не найден</div>';
                return;
            }

            // Получаем роли
            const roles = window.rolesDatabase?.filter(r => r.titleId === titleId) || [];
            
            let charactersHtml = '';
            if (roles.length > 0) {
                charactersHtml = '<h2 style="color:#d000ff; margin-top:30px;">🎭 Персонажи и озвучка</h2><div class="characters-grid">';
                roles.forEach(role => {
                    const voice = window.voicesDatabase?.find(v => v.id === role.voiceId);
                    charactersHtml += `
                        <div class="character-card">
                            <img src="${role.characterImage || 'https://via.placeholder.com/180x150/3a0035/fff?text=Персонаж'}" class="character-image" onerror="this.src='https://via.placeholder.com/180x150/3a0035/fff?text=?'">
                            <div class="character-name">${role.character}</div>
                            <p style="color:#aaa;">Озвучивает: <a href="voice.html?id=${role.voiceId}" style="color:#d000ff;">${voice?.name || role.voiceId}</a></p>
                        </div>
                    `;
                });
                charactersHtml += '</div>';
            }

            // Список серий
            const episodes = title.episodesList || [];
            let episodesHtml = '';
            if (episodes.length > 0) {
                episodesHtml = `
                    <h2 style="color:#d000ff; margin-top:30px;">📺 Список серий</h2>
                    <div class="episodes-list">
                        ${episodes.map(ep => `
                            <div class="episode-item" onclick="playEpisode('${ep.url}')" style="cursor:pointer;">
                                <span class="episode-number">Серия ${ep.number}</span>
                                <span class="episode-title" style="color:#fff;">${ep.title}</span>
                                <span class="episode-status ${ep.status === 'Озвучено' ? 'status-ready' : 'status-soon'}">${ep.status}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // Плеер
            const firstEpisode = episodes.find(ep => ep.url) || { url: '' };
            const posterImage = title.imageVertical || title.imageVertical || title.image;

            content.innerHTML = `
                <div class="anime-header">
                    <img src="${posterImage}" alt="${title.name}" class="anime-poster" onerror="this.src='https://via.placeholder.com/250/3a0035/fff?text=${title.name}'">
                    <div class="anime-info">
                        <h1 class="anime-title" style="color:#d000ff;">${title.name}</h1>
                        <div class="anime-meta">
                            <span class="anime-tag">${title.type || 'Аниме'}</span>
                            <span class="anime-tag">${title.year || '2025'}</span>
                            <span class="anime-tag">${title.episodes || '?'} серий</span>
                            <span class="anime-tag">⭐ ${title.rating || '4.5'}</span>
                        </div>
                        <p style="color:#fff;"><strong style="color:#d000ff;">Жанры:</strong> ${title.genres?.join(', ') || 'Не указаны'}</p>
                        <div class="anime-description" style="color:#ccc;">${title.description || 'Описание отсутствует'}</div>
                    </div>
                </div>
                
                <h2 style="color:#d000ff;">▶ Смотреть онлайн</h2>
                <div class="player-container" id="playerContainer">
                    ${firstEpisode.url ? `
                        <iframe id="playerFrame" width="100%" height="100%" src="${firstEpisode.url}" frameborder="0" allowfullscreen></iframe>
                    ` : `
                        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#666; background:#1a001a;">
                            <p>Скоро появится</p>
                        </div>
                    `}
                </div>
                
                ${episodesHtml}
                
                ${charactersHtml}
                
                <div id="comments-container"></div>
            `;

            // Рендерим форму комментариев
            renderCommentForm();
            
        }, 100);
    }

    window.playEpisode = function(url) {
        const container = document.getElementById('playerContainer');
        if (!url) {
            container.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#666; background:#1a001a;">
                    <p>Серия ещё не доступна</p>
                </div>
            `;
            return;
        }
        container.innerHTML = `
            <iframe id="playerFrame" width="100%" height="100%" src="${url}" frameborder="0" allowfullscreen></iframe>
        `;
    };

    // Подписка на изменения авторизации
    onAuthStateChangedListener((user) => {
        currentUser = user;
        updateAuthButton(user);
        // Обновляем форму комментариев
        if (document.getElementById('comments-container')) {
            renderCommentForm();
        }
    });

    document.addEventListener('DOMContentLoaded', loadTitle);
</script>

</body>
</html>
