<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайтлы - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
    <a href="index.html">
        <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
    </a>
        <a href="index.html" class="nav-icon-btn">
            🏠Главная
        </a>
        <a href="titles.html" class="nav-icon-btn">
            🎦Тайтлы
        </a>
        <a href="sostav.html" class="nav-icon-btn">
            🎭Состав
        </a>
        <a href="search.html" class="nav-icon-btn">
            🔍Поиск
        </a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar" width="240" height="240">
        <h1 class="title">Наши тайтлы</h1>
        <hr>
    </div>
    
    <div class="content-box">
        <div class="titles-grid" id="titles-container">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p>© 2026 foxline Studio</p>
</div>

<script>
    function loadTitles() {
        const container = document.getElementById('titles-container');
        if (window.titlesDatabase && window.titlesDatabase.length > 0) {
            container.innerHTML = window.titlesDatabase.map(title => `
                <a href="title.html?id=${title.id}" class="title-card">
                    <img src="${title.image}" alt="${title.name}" class="title-card-image" onerror="this.src='https://via.placeholder.com/200x280/001a8c/ffffff'">
                    <div class="title-card-info">
                        <div class="title-card-name">${title.name}</div>
                        <div class="title-card-meta">
                            <span>⚡ ${title.episodes} серий</span>
                            <span>⭐ ${title.rating}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
    }
    document.addEventListener('DOMContentLoaded', loadTitles);
</script>
</body>
</html>
