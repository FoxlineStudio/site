<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайтлы - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        /* Стили для фильтров */
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: rgba(58, 0, 53, 0.2);
            border-radius: 15px;
            border: 1px solid #3a0035;
            align-items: center;
        }
        .filters-container label {
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 25px;
            border: 2px solid #3a0035;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .filter-btn:hover {
            border-color: #6d076d;
            color: #fff;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #6d076d, #3a0035);
            border-color: #6d076d;
            color: #fff;
        }
        .filter-btn.active:hover {
            background: linear-gradient(135deg, #8a0a8a, #4a0045);
        }
        .filter-label {
            color: #666;
            font-size: 13px;
            margin-right: 5px;
        }
        .filter-divider {
            color: #3a0035;
            font-size: 20px;
            margin: 0 5px;
        }
        .titles-count {
            color: #666;
            font-size: 14px;
            margin-left: auto;
        }
        .titles-count span {
            color: #d000ff;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .filters-container {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .filter-group {
                justify-content: center;
            }
            .titles-count {
                margin-left: 0;
                text-align: center;
            }
            .filter-divider {
                display: none;
            }
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <h1 class="title">Наши тайтлы</h1>
        <hr>
    </div>
    
    <div class="content-box">
        <!-- ФИЛЬТРЫ -->
        <div class="filters-container">
            <div class="filter-group">
                <span class="filter-label">📂 Тип:</span>
                <button class="filter-btn active" data-filter="type" data-value="all">Все</button>
                <button class="filter-btn" data-filter="type" data-value="Сериал">Сериалы</button>
                <button class="filter-btn" data-filter="type" data-value="Фильм">Фильмы</button>
                <button class="filter-btn" data-filter="type" data-value="Короткометражка">Короткометражки</button>
            </div>
            
            <span class="filter-divider">|</span>
            
            <div class="filter-group">
                <span class="filter-label">📊 Серий:</span>
                <button class="filter-btn active" data-filter="episodes" data-value="all">Все</button>
                <button class="filter-btn" data-filter="episodes" data-value="1">1</button>
                <button class="filter-btn" data-filter="episodes" data-value="8">8</button>
                <button class="filter-btn" data-filter="episodes" data-value="12">12+</button>
            </div>
            
            <div class="titles-count">
                Найдено: <span id="titlesCount">0</span>
            </div>
        </div>
        
        <!-- Список тайтлов -->
        <div class="titles-grid" id="titles-container">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p>© 2026 foxline Studio</p>
</div>

<script type="module">
    import { getCurrentUser, onAuthStateChangedListener } from './firebase-config.js';

    let currentFilterType = 'all';
    let currentFilterEpisodes = 'all';

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    function getFilteredTitles() {
        let titles = window.titlesDatabase || [];
        
        // Фильтр по типу
        if (currentFilterType !== 'all') {
            titles = titles.filter(t => t.type === currentFilterType);
        }
        
        // Фильтр по количеству серий
        if (currentFilterEpisodes !== 'all') {
            const num = parseInt(currentFilterEpisodes);
            if (currentFilterEpisodes === '12') {
                titles = titles.filter(t => t.episodes >= 12);
            } else {
                titles = titles.filter(t => t.episodes === num);
            }
        }
        
        return titles;
    }

    function renderTitles() {
        const container = document.getElementById('titles-container');
        const countEl = document.getElementById('titlesCount');
        
        const filtered = getFilteredTitles();
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px; color:#666; width:100%;">
                    <p style="font-size:24px;">😕</p>
                    <p>По выбранным фильтрам ничего не найдено</p>
                    <button onclick="resetFilters()" style="margin-top:15px; padding:10px 25px; background:linear-gradient(135deg,#6d076d,#3a0035); color:#fff; border:none; border-radius:25px; cursor:pointer;">Сбросить фильтры</button>
                </div>
            `;
            countEl.textContent = '0';
            return;
        }
        
        countEl.textContent = filtered.length;
        
        container.innerHTML = filtered.map(title => {
            const image = title.imageVertical || title.imageHorizontal || title.image;
            return `
                <a href="title.html?id=${title.id}" class="title-card">
                    <img src="${image}" alt="${title.name}" class="title-card-image" onerror="this.src='https://via.placeholder.com/200x280/6d076d/fff?text=${encodeURIComponent(title.name)}'">
                    <div class="title-card-info">
                        <div class="title-card-name">${title.name}</div>
                        <div class="title-card-meta">
                            <span>${title.type}</span>
                            <span>${title.episodes} серий</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:5px;">
                            <span style="color:#666; font-size:13px;">${title.year || ''}</span>
                            <span style="color:#ffaa00;">⭐ ${title.rating}</span>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    window.resetFilters = function() {
        currentFilterType = 'all';
        currentFilterEpisodes = 'all';
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelectorAll('.filter-btn[data-filter="type"][data-value="all"]').forEach(btn => {
            btn.classList.add('active');
        });
        document.querySelectorAll('.filter-btn[data-filter="episodes"][data-value="all"]').forEach(btn => {
            btn.classList.add('active');
        });
        
        renderTitles();
    };

    function setupFilters() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const filterType = this.dataset.filter;
                const value = this.dataset.value;
                
                // Убираем активный класс у всех кнопок этой группы
                document.querySelectorAll(`.filter-btn[data-filter="${filterType}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                this.classList.add('active');
                
                // Обновляем фильтры
                if (filterType === 'type') {
                    currentFilterType = value;
                } else if (filterType === 'episodes') {
                    currentFilterEpisodes = value;
                }
                
                renderTitles();
            });
        });
    }

    function loadTitles() {
        renderTitles();
        setupFilters();
    }

    onAuthStateChangedListener((user) => {
        updateAuthButton(user);
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadTitles();
        updateAuthButton(getCurrentUser());
    });
</script>

</body>
</html>
