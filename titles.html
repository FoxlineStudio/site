<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайтлы - foxline Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        /* Стили для фильтров */
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: rgba(58, 0, 53, 0.2);
            border-radius: 15px;
            border: 1px solid #3a0035;
            align-items: center;
        }
        .filters-container label {
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 25px;
            border: 2px solid #3a0035;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .filter-btn:hover {
            border-color: #6d076d;
            color: #fff;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #6d076d, #3a0035);
            border-color: #6d076d;
            color: #fff;
        }
        .filter-btn.active:hover {
            background: linear-gradient(135deg, #8a0a8a, #4a0045);
        }
        .filter-label {
            color: #666;
            font-size: 13px;
            margin-right: 5px;
        }
        .filter-divider {
            color: #3a0035;
            font-size: 20px;
            margin: 0 5px;
        }
        .titles-count {
            color: #666;
            font-size: 14px;
            margin-left: auto;
        }
        .titles-count span {
            color: #d000ff;
            font-weight: bold;
        }
        .episode-input {
    width: 60px;
    padding: 6px 10px;
    border-radius: 25px;
    border: 2px solid #3a0035;
    background: rgba(58, 0, 53, 0.3);
    color: #fff;
    font-size: 14px;
    text-align: center;
    outline: none;
    transition: all 0.3s ease;
    font-family: inherit;
    /* Убираем стрелки вверх/вниз (стандарт) */
    appearance: textfield;
    -webkit-appearance: textfield;
    -moz-appearance: textfield;
}
        .episode-input:focus {
            border-color: #d000ff;
            box-shadow: 0 0 15px rgba(208, 0, 255, 0.2);
        }
        .episode-input::placeholder {
            color: #666;
        }
        .episode-input::-webkit-outer-spin-button,
.episode-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.episode-input[type="number"] {
    -moz-appearance: textfield;
    appearance: textfield;
}
        .episode-range-label {
            color: #666;
            font-size: 13px;
        }
        .reset-episodes-btn {
            padding: 6px 14px;
            border-radius: 25px;
            border: 2px solid #3a0035;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .reset-episodes-btn:hover {
            border-color: #6d076d;
            color: #fff;
        }
        @media (max-width: 768px) {
            .filters-container {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .filter-group {
                justify-content: center;
            }
            .titles-count {
                margin-left: 0;
                text-align: center;
            }
            .filter-divider {
                display: none;
            }
            .episode-input {
                width: 50px;
            }
        }
        @media (max-width: 480px) {
            .filters-container {
                padding: 12px;
            }
            .filter-btn {
                padding: 5px 12px;
                font-size: 12px;
            }
            .episode-input {
                width: 45px;
                padding: 5px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="foxline Studio" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
    </div>
</header>

<div class="container">
    <div class="header">
        <img src="logo2.jpg" alt="foxline Studio" class="avatar">
        <h1 class="title">Наши тайтлы</h1>
        <hr>
    </div>
    
    <div class="content-box">
        <!-- ФИЛЬТРЫ -->
        <div class="filters-container">
            <div class="filter-group">
                <span class="filter-label">📂 Тип:</span>
                <button class="filter-btn active" data-filter="type" data-value="all">Все</button>
                <button class="filter-btn" data-filter="type" data-value="Сериал">Сериалы</button>
                <button class="filter-btn" data-filter="type" data-value="Фильм">Фильмы</button>
                <button class="filter-btn" data-filter="type" data-value="Короткометражка">Короткометражки</button>
            </div>
            
            <span class="filter-divider">|</span>
            
            <div class="filter-group">
                <span class="filter-label">📊 Серий:</span>
                <span class="episode-range-label">от</span>
                <input type="number" class="episode-input" id="episodeFrom" placeholder="0" min="0">
                <span class="episode-range-label">до</span>
                <input type="number" class="episode-input" id="episodeTo" placeholder="∞" min="0">
                <button class="reset-episodes-btn" id="resetEpisodes">✕ Сбросить</button>
            </div>
            
            <div class="titles-count">
                Найдено: <span id="titlesCount">0</span>
            </div>
        </div>
        
        <!-- Список тайтлов -->
        <div class="titles-grid" id="titles-container">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p>© 2026 foxline Studio</p>
</div>

<script type="module">
    import { getCurrentUser, onAuthStateChangedListener } from './firebase-config.js';

    let currentFilterType = 'all';
    let currentEpisodeFrom = 0;
    let currentEpisodeTo = Infinity;

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    function getFilteredTitles() {
        let titles = window.titlesDatabase || [];
        
        // Фильтр по типу
        if (currentFilterType !== 'all') {
            titles = titles.filter(t => t.type === currentFilterType);
        }
        
        // Фильтр по диапазону серий
        titles = titles.filter(t => {
            const eps = t.episodes || 0;
            return eps >= currentEpisodeFrom && eps <= currentEpisodeTo;
        });
        
        return titles;
    }

    function renderTitles() {
        const container = document.getElementById('titles-container');
        const countEl = document.getElementById('titlesCount');
        
        const filtered = getFilteredTitles();
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px; color:#666; width:100%;">
                    <p style="font-size:24px;">😕</p>
                    <p>По выбранным фильтрам ничего не найдено</p>
                    <button onclick="resetAllFilters()" style="margin-top:15px; padding:10px 25px; background:linear-gradient(135deg,#6d076d,#3a0035); color:#fff; border:none; border-radius:25px; cursor:pointer;">Сбросить фильтры</button>
                </div>
            `;
            countEl.textContent = '0';
            return;
        }
        
        countEl.textContent = filtered.length;
        
        container.innerHTML = filtered.map(title => {
            const image = title.imageVertical || title.imageHorizontal || title.image;
            return `
                <a href="title.html?id=${title.id}" class="title-card">
                    <img src="${image}" alt="${title.name}" class="title-card-image" onerror="this.src='https://via.placeholder.com/200x280/6d076d/fff?text=${encodeURIComponent(title.name)}'">
                    <div class="title-card-info">
                        <div class="title-card-name">${title.name}</div>
                        <div class="title-card-meta">
                            <span>${title.type}</span>
                            <span>${title.episodes} серий</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:5px;">
                            <span style="color:#666; font-size:13px;">${title.year || ''}</span>
                            <span style="color:#ffaa00;">⭐ ${title.rating}</span>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    window.resetAllFilters = function() {
        currentFilterType = 'all';
        currentEpisodeFrom = 0;
        currentEpisodeTo = Infinity;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelectorAll('.filter-btn[data-filter="type"][data-value="all"]').forEach(btn => {
            btn.classList.add('active');
        });
        
        document.getElementById('episodeFrom').value = '';
        document.getElementById('episodeTo').value = '';
        
        renderTitles();
    };

    function setupFilters() {
        // Фильтр по типу
        document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(btn => {
            btn.addEventListener('click', function() {
                const value = this.dataset.value;
                
                document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(b => {
                    b.classList.remove('active');
                });
                this.classList.add('active');
                
                currentFilterType = value;
                renderTitles();
            });
        });

        // Фильтр по диапазону серий
        const episodeFrom = document.getElementById('episodeFrom');
        const episodeTo = document.getElementById('episodeTo');
        
        const updateEpisodeFilter = function() {
            const from = parseInt(episodeFrom.value);
            const to = parseInt(episodeTo.value);
            
            currentEpisodeFrom = isNaN(from) ? 0 : from;
            currentEpisodeTo = isNaN(to) ? Infinity : to;
            
            renderTitles();
        };
        
        episodeFrom.addEventListener('input', updateEpisodeFilter);
        episodeTo.addEventListener('input', updateEpisodeFilter);
        
        // Сброс диапазона
        document.getElementById('resetEpisodes').addEventListener('click', function() {
            episodeFrom.value = '';
            episodeTo.value = '';
            currentEpisodeFrom = 0;
            currentEpisodeTo = Infinity;
            renderTitles();
        });

        // Обработка Enter в полях ввода
        episodeFrom.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                episodeTo.focus();
            }
        });
        episodeTo.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                renderTitles();
            }
        });
    }

    function loadTitles() {
        renderTitles();
        setupFilters();
    }

    onAuthStateChangedListener((user) => {
        updateAuthButton(user);
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadTitles();
        updateAuthButton(getCurrentUser());
    });
</script>

</body>
</html>
